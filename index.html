<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تقسيم PDF بالمعاينة</title>

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
    font-family:Tahoma;
    background:#f4f6fb;
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h2{
    margin-bottom:15px;
}

input{
    margin:15px;
}

.page{
    background:white;
    margin:20px auto;
    padding:10px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

canvas{
    width:100%;
    border-radius:8px;
}

.cut{
    font-size:32px;
    cursor:pointer;
    margin:15px;
    opacity:.35;
    transition:.25s;
}

.cut.active{
    opacity:1;
    color:red;
    transform:scale(1.2);
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

#status{
    margin-top:15px;
    color:#333;
}

</style>
</head>

<body>

<div class="container">

<h2>تقسيم ملف PDF بالمعاينة</h2>

<input type="file" id="file" accept="application/pdf">

<div id="pages"></div>

<button onclick="splitPDF()">تقسيم وتحميل ZIP</button>

<p id="status"></p>

</div>

<script>

let pdfDoc = null;
let pdfBytesGlobal = null;
let cutPoints = [];

/* رفع الملف */
document.getElementById("file").addEventListener("change", loadPDF);

async function loadPDF(e){

cutPoints = [];
document.getElementById("status").innerText = "جاري تحميل الصفحات...";

const file = e.target.files[0];
pdfBytesGlobal = await file.arrayBuffer();

const loadingTask = pdfjsLib.getDocument({data: pdfBytesGlobal});
pdfDoc = await loadingTask.promise;

const pagesDiv = document.getElementById("pages");
pagesDiv.innerHTML = "";

for(let i=1;i<=pdfDoc.numPages;i++){

    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({scale:1.3});

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({
        canvasContext:ctx,
        viewport:viewport
    }).promise;

    const pageBox = document.createElement("div");
    pageBox.className = "page";

    /* رقم الصفحة */
    const label = document.createElement("div");
    label.innerHTML = "الصفحة " + i;
    label.style.marginBottom = "10px";
    label.style.fontWeight = "bold";

    pageBox.appendChild(label);
    pageBox.appendChild(canvas);

    pagesDiv.appendChild(pageBox);

    /* زر المقص */
    if(i < pdfDoc.numPages){

        const cut = document.createElement("div");
        cut.innerHTML = "✂";
        cut.className = "cut";
        cut.dataset.index = i;

        cut.onclick = ()=>{
            cut.classList.toggle("active");

            const index = parseInt(cut.dataset.index);

            if(cut.classList.contains("active")){
                if(!cutPoints.includes(index))
                    cutPoints.push(index);
            }else{
                cutPoints = cutPoints.filter(x => x !== index);
            }
        };

        pagesDiv.appendChild(cut);
    }

}

document.getElementById("status").innerText = "تم عرض الصفحات";

}

/* التقسيم */
async function splitPDF(){

if(!pdfDoc){
    alert("اختر ملف PDF أولاً");
    return;
}

document.getElementById("status").innerText = "جاري التقسيم...";

cutPoints.sort((a,b)=>a-b);

/* إنشاء نطاقات الصفحات */
const ranges = [];
let start = 1;

for(let p of cutPoints){
    ranges.push([start,p]);
    start = p + 1;
}

ranges.push([start,pdfDoc.numPages]);

const original = await PDFLib.PDFDocument.load(pdfBytesGlobal);

/* إنشاء ZIP */
const zip = new JSZip();

let fileNumber = 1;

for(let range of ranges){

    const newPdf = await PDFLib.PDFDocument.create();

    for(let i=range[0]-1;i<range[1];i++){
        const [page] = await newPdf.copyPages(original,[i]);
        newPdf.addPage(page);
    }

    const bytes = await newPdf.save();

    /* تسمية الملف حسب الصفحات */
    const fileName = "pages_" + range[0] + "-" + range[1] + ".pdf";

    zip.file(fileName, bytes);

    fileNumber++;
}

/* إنشاء ملف ZIP */
const zipBlob = await zip.generateAsync({type:"blob"});

const link = document.createElement("a");
link.href = URL.createObjectURL(zipBlob);
link.download = "split_files.zip";
link.click();

document.getElementById("status").innerText = "تم إنشاء ملف ZIP بنجاح";

}

</script>

</body>
</html>
